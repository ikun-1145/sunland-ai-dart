name: sunland_ai_app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.4
dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  supabase_flutter: ^2.5.6
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  flutter_markdown: ^0.7.7+1
  flutter_highlight: ^0.7.0
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  assets:
    - assets/icons/google.png
    - assets/icons/github.svg
    - assets/ailogo.png
    - assets/ten_wx.webp
    - assets/ten_zfb.webp

flutter_launcher_icons:
  android: true
  ios: true
